<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause - Hacker News</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }
        
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .message {
            color: #666;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .timer-container {
            margin: 40px 0;
        }
        
        .timer {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            font-variant-numeric: tabular-nums;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .timer-label {
            color: #999;
            font-size: 14px;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .skip-btn {
            background: #f0f0f0;
            color: #333;
        }
        
        .skip-btn:hover {
            background: #e0e0e0;
        }
        
        .skip-btn:active {
            transform: scale(0.98);
        }
        
        .proceed-btn {
            background: #667eea;
            color: white;
        }
        
        .proceed-btn:hover {
            background: #5568d3;
        }
        
        .proceed-btn:active {
            transform: scale(0.98);
        }
        
        .proceed-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .footer {
            color: #999;
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏸️</div>
        <h1>Hold on a moment</h1>
        <div class="message">
            You're about to visit Hacker News. Take a breath and ask yourself: do you really need to be there right now?
        </div>
        
        <div class="timer-container">
            <div class="timer" id="timer">10</div>
            <div class="timer-label">seconds</div>
        </div>
        
        <div class="button-group">
            <button class="skip-btn" onclick="skipDelay()">Go Back</button>
            <button class="proceed-btn" id="proceedBtn" onclick="proceedToSite()" disabled>Continue</button>
        </div>
        
        <div class="footer">
            This delay helps you make intentional choices about your browsing.
        </div>
    </div>

    <script>
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        const proceedBtn = document.getElementById('proceedBtn');
        
        function updateTimer() {
            timerElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                proceedBtn.disabled = false;
                proceedBtn.textContent = 'Visit Hacker News';
                // Auto-redirect after delay completes
                setTimeout(() => {
                    proceedToSite();
                }, 500);
            }
            
            timeLeft--;
        }
        
        const timerInterval = setInterval(updateTimer, 1000);
        
        function proceedToSite() {
            window.location.href = 'https://news.ycombinator.com';
        }
        
        function skipDelay() {
            window.history.back();
        }
    </script>
</body>
</html>
